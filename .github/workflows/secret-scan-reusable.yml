name: Secret scan (reusable)

# Reusable Gitleaks secret scan. Zero external dependencies — runs the MIT-licensed
# Gitleaks CLI via its container image (no paid GitHub Action licence required).
#
# Caller pattern (trigger on push and/or pull_request):
#
#   jobs:
#     secret-scan:
#       uses: rolliq-shared-infra/security/.github/workflows/secret-scan-reusable.yml@<SHA>
#       # no secrets needed
#
# The caller workflow must grant:
#   permissions:
#     contents: read

permissions: {}

on:
  workflow_call:
    inputs:
      fetch_depth:
        description: >-
          Git fetch depth. 0 = full history (catches secrets in older commits).
          Use 0 for first-time scans; 1 is fine for PR-only incremental scanning
          when Gitleaks runs on every push and catches new commits as they arrive.
        type: number
        required: false
        default: 0
      exit_code:
        description: >-
          Gitleaks exit code on findings. 1 = fail (block CI). 0 = report only.
          Default 1 (blocking). Set to 0 for repos in rollout phase.
        type: number
        required: false
        default: 1

jobs:
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Gitleaks scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.18.4@sha256:75bdb2b2f4db213cde0b8295f13a88d6b333091bbfbf3012a4e083d00d31caba \
            detect --source=/repo --redact --verbose \
            --exit-code=${{ inputs.exit_code }}
